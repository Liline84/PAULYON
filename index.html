<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAULYON Lab Hub</title>
    <meta name="description" content="bla bla bla"/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="logo">PAULYON</div>
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="mobile-menu" id="mobileMenu">
        <div class="menu-header">
            <h2>Menu</h2>
            <button id="closeBtn" class="close-btn"><i class="fa fa-times"></i></button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="index.html"><i class="fa fa-home"></i> Accueil</a></li>
            
            <li class="has-submenu">
                <a href="#" class="submenu-toggle"><i class="fa fa-box"></i> Boutique <i class="fa fa-chevron-down arrow"></i></a>
                <ul class="submenu">
                    <li><a href="products.html">Produits</a></li>
                    <li><a href="services.html">Services</a></li>
                </ul>
            </li>
            
            <li><a href="contact.html"><i class="fa fa-envelope"></i> Contact</a></li>
            
            <li class="has-submenu">
                <a href="#" class="submenu-toggle"><i class="fa fa-gear"></i> Paramètres <i class="fa fa-chevron-down arrow"></i></a>
                <ul class="submenu">
                    <li><a href="settings.html">Général</a></li>
                    <li><a href="#">Langue</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <div class="overlay" id="menuOverlay"></div>

    <main class="main-content">
        <section class="hero">
            <h1>Bienvenue chez PAULYON</h1>
            <p>Transformation digitale & solutions modernes</p>
        </section>

        </main>

    <footer>
        <p>© 2026 PAULYON | All rights reserved</p>
    </footer>

    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const closeBtn = document.getElementById('closeBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const overlay = document.getElementById('menuOverlay');

        // Ouvrir et fermer le menu principal
        function toggleMenu() {
            mobileMenu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // Gérer les sous-menus (Boutique, Paramètres)
        const submenuToggles = document.querySelectorAll('.submenu-toggle');
        submenuToggles.forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                this.parentElement.classList.toggle('active');
            });
        });
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - PAULYON's Lab Hub</title>
    
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="shell">
        
        <div id="header-container"></div>

        <div class="main-wrap">
            
            <main class="page-content">
                
                <div class="page-hero">
                    <div>
                        <div class="breadcrumb">
                            <a href="index.html">Accueil</a> <span>/</span> <span class="text-cyan">Paramètres</span>
                        </div>
                        <h1>Paramètres</h1>
                        <p>Gérez vos préférences, la langue et l'apparence du site.</p>
                    </div>
                </div>

                <section class="section pt-0">
                    <div class="settings-grid">

                        <div class="settings-panel">
                            <div class="settings-panel-head">
                                <div class="settings-panel-icon"><i class="fa-solid fa-moon"></i></div>
                                <div>
                                    <h3>Apparence</h3>
                                    <p>Personnalisez le thème de l'application</p>
                                </div>
                            </div>
                            <div class="settings-panel-body">
                                <div class="settings-row">
                                    <div class="settings-row-label">
                                        <strong>Mode Sombre</strong>
                                        <span>Activer ou désactiver le thème sombre</span>
                                    </div>
                                    <label class="toggle">
                                        <input type="checkbox" id="toggle-theme" checked>
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="settings-panel">
                            <div class="settings-panel-head">
                                <div class="settings-panel-icon"><i class="fa-solid fa-globe"></i></div>
                                <div>
                                    <h3>Langue</h3>
                                    <p>Choisissez votre langue préférée</p>
                                </div>
                            </div>
                            <div class="settings-panel-body">
                                <div class="lang-grid">
                                    <button class="lang-btn active" data-lang="fr">Français (FR)</button>
                                    <button class="lang-btn" data-lang="en">English (EN)</button>
                                    <button class="lang-btn" data-lang="es">Español (ES)</button>
                                    <button class="lang-btn" data-lang="ht">Kreyòl (HT)</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </section>

            </main>

            <div id="footer-container"></div>
            
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. GESTION DE LA LANGUE (Effet visuel + Fonctionnement)
            const langBtns = document.querySelectorAll('.lang-btn');
            
            // Si une langue est déjà en mémoire, on active le bon bouton
            const currentLang = localStorage.getItem('lang') || 'fr';
            langBtns.forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Action au clic sur une langue
            langBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Retire la classe 'active' de tous les boutons
                    langBtns.forEach(b => b.classList.remove('active'));
                    // Ajoute la classe 'active' au bouton cliqué
                    this.classList.add('active');

                    // Récupère le code de la langue (fr, en, etc.)
                    const lang = this.getAttribute('data-lang');
                    
                    // Appelle la fonction de ton fichier app.js
                    if (typeof setLanguage === 'function') {
                        setLanguage(lang);
                    }
                });
            });

            // 2. GESTION DU THÈME
            const themeToggle = document.getElementById('toggle-theme');
            if (themeToggle) {
                themeToggle.addEventListener('change', function() {
                    if(this.checked) {
                        document.body.classList.remove('light-theme');
                    } else {
                        document.body.classList.add('light-theme');
                    }
                });
            }

        });
    </script>
</body>
</html>
